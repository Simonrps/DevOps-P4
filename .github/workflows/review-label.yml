# This GitHub Actions workflow automatically adds an "approved" label to a pull request when a review is submitted with 
# the "approved" state. It listens for the `pull_request_review` event and checks if the review state is "approved".
# If so, it uses the GitHub API to add the "approved" label to the pull request.

name: Review labeler

on:
  pull_request_review:
    types: [submitted]

permissions:
  pull-requests: write
  contents: read

jobs:
  label-on-approval:
    if: github.event.review.state == 'approved'
    runs-on: ubuntu-latest

    steps:
      - name: Add approved label
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            await github.rest.issues.addLabels({
              owner,
              repo,
              issue_number,
              labels: ['approved']
            });